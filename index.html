  @import url('https://fonts.googleapis.com/css2?family=Anton&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080808; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  .scratch { position: fixed; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.025); pointer-events: none; z-index: 0; }
  .scratch-1 { left: 33%; } .scratch-2 { left: 71%; }
  .grain { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; opacity: 0.055;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px; }

  .app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 0 80px; }

  /* HERO */
  .hero { padding: 48px 24px 32px; border-bottom: 1px solid #141414; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #888; margin-bottom: 16px; }
  .festival-title { font-family: 'Anton', sans-serif; font-size: clamp(56px, 14vw, 120px); line-height: 0.9; color: #fff; letter-spacing: -0.01em; text-transform: uppercase; }
  .festival-title .cinema { color: transparent; -webkit-text-stroke: 1px #fff; }
  .byline { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 13px; color: #666; margin-top: 14px; line-height: 1.6; }

  /* NEWSPAPER TICKER */
  .newspaper { border-top: 1px solid #1e1e1e; border-bottom: 1px solid #1e1e1e; padding: 0; overflow: hidden; position: relative; }
  .newspaper-inner { padding: 14px 24px; }
  .newspaper-dateline { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #333; margin-bottom: 10px; }
  .headline-item { padding: 8px 0; border-bottom: 1px solid #0e0e0e; }
  .headline-item:last-child { border-bottom: none; }
  .headline-text { font-family: 'DM Serif Display', serif; font-size: 15px; color: #bbb; line-height: 1.4; }
  .headline-text em { font-style: italic; color: #888; font-size: 13px; }

  /* NAV */
  .nav { display: flex; border-bottom: 1px solid #141414; padding: 0 24px; position: sticky; top: 0; background: #080808; z-index: 10; }
  .nav-btn { background: none; border: none; border-bottom: 2px solid transparent; color: #555; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 16px 16px 14px; cursor: pointer; transition: color 0.15s; margin-bottom: -1px; flex: 1; text-align: center; -webkit-tap-highlight-color: transparent; }
  .nav-btn:hover { color: #888; } .nav-btn.active { color: #fff; border-bottom-color: #fff; }

  .content { padding: 32px 24px 0; }
  .day-block { margin-bottom: 44px; }
  .day-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #666; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .day-label::after { content: ''; flex: 1; height: 1px; background: #141414; }
  .submitted-badge { color: #2ecc71; font-size: 9px; letter-spacing: 0.2em; }
  .locked-badge { color: #444; font-size: 9px; }

  /* FILM CARDS */
  .film-card { border: 1px solid #141414; margin-bottom: 2px; position: relative; overflow: hidden; }
  .film-card.locked { opacity: 0.25; pointer-events: none; }
  .film-card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .film-card-inner { padding: 18px 18px 18px 26px; }
  .film-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: #eee; margin-bottom: 4px; line-height: 1.2; }
  .film-meta { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: #555; text-transform: uppercase; margin-bottom: 14px; }
  .consensus { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 12px; margin-top: 8px; }
  .dots { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .dot { width: 26px; height: 26px; border-radius: 50%; border: none; cursor: pointer; background: #1a1a1a; transition: background 0.1s, transform 0.1s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .dot:hover { transform: scale(1.1); } .dot:disabled { cursor: default; } .dot:disabled:hover { transform: none; }
  .dot-score { font-family: 'Anton', sans-serif; font-size: 14px; margin-left: 8px; }
  .film-avg-inline { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 12px; color: #666; }
  .hot-takes { display: flex; gap: 16px; margin-top: 10px; }
  .hot-take { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #444; }
  .hot-take span { font-weight: 500; }
  .review-input { display: block; width: 100%; margin-top: 14px; background: #0c0c0c; border: 1px solid #141414; color: #888; padding: 12px 14px; font-family: 'DM Serif Display', serif; font-style: italic; font-size: 15px; line-height: 1.7; resize: vertical; outline: none; border-radius: 0; -webkit-appearance: none; }
  .review-input:focus { border-color: #2a2a2a; color: #aaa; } .review-input::placeholder { color: #333; }
  .submitted-review { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 13px; color: #555; margin-top: 12px; line-height: 1.7; padding-left: 12px; border-left: 1px solid #1e1e1e; }

  /* SUBMIT */
  .submit-btn { display: block; width: 100%; margin-top: 16px; background: none; border: 1px solid #333; color: #555; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; padding: 16px 24px; cursor: default; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .submit-btn.ready { border-color: #fff; color: #fff; cursor: pointer; }
  .submit-btn.ready:active { background: #fff; color: #080808; }

  /* SUBMISSION REVEAL */
  .reveal-overlay { position: fixed; inset: 0; background: #080808; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
  .reveal-overlay.visible { opacity: 1; pointer-events: all; }
  .reveal-archive { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #333; margin-bottom: 32px; text-align: center; }
  .reveal-number { font-family: 'Anton', sans-serif; font-size: clamp(72px, 20vw, 120px); color: #fff; line-height: 1; text-align: center; }
  .reveal-label { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 16px; color: #555; margin-top: 8px; text-align: center; }
  .reveal-film { font-family: 'DM Serif Display', serif; font-size: 20px; color: #888; margin-top: 40px; text-align: center; line-height: 1.4; }
  .reveal-dismiss { margin-top: 48px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #2a2a2a; background: none; border: 1px solid #1e1e1e; padding: 12px 24px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: color 0.2s, border-color 0.2s; }
  .reveal-dismiss:hover { color: #fff; border-color: #fff; }

  /* CONFIRM */
  .confirm-banner { margin-top: 16px; padding: 16px 20px; border: 1px solid #1a3a1a; background: #0a160a; }
  .confirm-banner-title { font-family: 'Anton', sans-serif; font-size: 16px; color: #2ecc71; letter-spacing: 0.05em; margin-bottom: 4px; }
  .confirm-banner-sub { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 13px; color: #2a5a2a; }

  /* NAME SCREEN */
  .name-screen { max-width: 100%; }
  .intro-text { font-family: 'DM Serif Display', serif; font-size: 15px; color: #555; line-height: 1.8; margin-bottom: 16px; }
  .name-hint { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 13px; color: #444; margin-bottom: 24px; line-height: 1.6; }
  .name-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #777; display: block; margin-bottom: 10px; }
  .name-row { display: flex; gap: 10px; }
  .name-input { flex: 1; min-width: 0; background: #0c0c0c; border: 1px solid #1e1e1e; color: #eee; padding: 14px 16px; font-family: 'DM Serif Display', serif; font-size: 16px; outline: none; border-radius: 0; -webkit-appearance: none; }
  .name-input:focus { border-color: #333; }
  .name-btn { background: #fff; border: none; color: #080808; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 14px 18px; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .voting-as { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: #666; text-transform: uppercase; margin-bottom: 28px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .voting-as strong { color: #fff; font-weight: 500; }
  .voting-as button { background: none; border: none; color: #555; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; text-decoration: underline; padding: 0; }

  /* FILMS TAB */
  .film-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 18px 0; border-bottom: 1px solid #0e0e0e; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .film-row-title { font-family: 'DM Serif Display', serif; font-size: 17px; color: #ccc; margin-bottom: 4px; line-height: 1.2; }
  .film-row-meta { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: #555; text-transform: uppercase; }
  .big-score { font-family: 'Anton', sans-serif; font-size: 32px; line-height: 1; text-align: right; flex-shrink: 0; }
  .big-score-sub { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: #555; text-align: right; margin-top: 2px; }
  .reviews-panel { padding: 0 0 20px; border-bottom: 1px solid #0e0e0e; }
  .review-item { padding: 14px 0; border-bottom: 1px solid #0e0e0e; }
  .review-item:last-child { border-bottom: none; }
  .review-author { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .review-score { color: #555; }
  .review-text { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 14px; color: #666; line-height: 1.7; }
  .no-reviews { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 14px; color: #444; padding: 16px 0; }

  /* RANKING */
  .ranking-locked { padding: 48px 0 32px; }
  .ranking-locked-title { font-family: 'Anton', sans-serif; font-size: clamp(28px, 6vw, 44px); color: #fff; letter-spacing: -0.01em; margin-bottom: 12px; }
  .ranking-locked-sub { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 32px; }
  .vote-count-big { font-family: 'Anton', sans-serif; font-size: 80px; color: #fff; line-height: 1; }
  .vote-count-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #444; margin-top: 4px; }
  .awards-header { padding: 32px 0 24px; border-bottom: 1px solid #141414; margin-bottom: 32px; }
  .awards-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #555; margin-bottom: 8px; }
  .awards-title { font-family: 'Anton', sans-serif; font-size: clamp(28px, 7vw, 52px); color: #fff; letter-spacing: -0.01em; line-height: 1; }
  .lb-row { display: flex; align-items: flex-start; gap: 16px; padding: 20px 0; border-bottom: 1px solid #0e0e0e; }
  .lb-rank { font-family: 'Anton', sans-serif; font-size: 26px; color: #333; width: 32px; text-align: right; flex-shrink: 0; padding-top: 2px; }
  .lb-rank.gold { color: #fff; }
  .lb-title { font-family: 'DM Serif Display', serif; font-size: 17px; color: #bbb; flex: 1; line-height: 1.2; }
  .lb-category { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em; color: #555; text-transform: uppercase; margin-top: 3px; }
  .lb-score { font-family: 'Anton', sans-serif; font-size: 30px; flex-shrink: 0; }
  .divisive-block { margin-top: 40px; padding-top: 32px; border-top: 1px solid #141414; }
  .divisive-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #555; margin-bottom: 16px; }
  .divisive-film { font-family: 'DM Serif Display', serif; font-size: 22px; color: #eee; margin-bottom: 8px; }
  .divisive-detail { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: #555; text-transform: uppercase; line-height: 1.8; }
  .voters-section { margin-top: 40px; }
  .voters-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #444; margin-bottom: 12px; }
  .voter-chip { display: inline-block; border: 1px solid #2a2a2a; color: #666; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 10px; margin: 0 5px 5px 0; }
  .empty { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 15px; color: #555; padding: 32px 0; }
  .locked-screen { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 16px; color: #666; padding: 48px 0; }
  .meta-count { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: #555; text-transform: uppercase; margin-bottom: 24px; }
